services:
  - type: web
    name: bwcrackers-api
    runtime: node
    region: singapore
    plan: free
    rootDir: bwcrackers
    buildCommand: npm install && npx medusa db:migrate && npm run build
    startCommand: npx medusa start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: COOKIE_SECRET
        sync: false
      - key: STORE_CORS
        sync: false
      - key: ADMIN_CORS
        sync: false
      - key: AUTH_CORS
        sync: false
